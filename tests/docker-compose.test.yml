services:
  postgres-test:
    image: ghcr.io/liling/postgres-for-ai:main
    environment:
      POSTGRES_PASSWORD: test
      POSTGRES_DB: testdb
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10
